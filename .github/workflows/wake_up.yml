name: Wake Up Streamlit App

on:
  schedule:
    # ตั้งเวลาให้รันทุกๆ 6 ชั่วโมง (ป้องกันโหมดหลับลึก)
    - cron: '0 */6 * * *'
  workflow_dispatch: # เพิ่มปุ่มให้กดรันเองได้ด้วย

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Selenium
        run: pip install selenium

      - name: Run Wake-up Script
        run: python keep_alive.py
